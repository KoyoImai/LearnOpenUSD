# ============================================================
# Learn OpenUSD - docker-compose.yml for DGX Spark
# ============================================================
# 使い方:
#   docker compose up --build          # 初回ビルド＆起動
#   docker compose up                  # 2回目以降
#   docker compose down                # 停止
# ============================================================

services:
  learn-openusd:
    build:
      context: .          # LearnOpenUSD リポジトリのルートを指定
      dockerfile: Dockerfile
    image: learn-openusd:latest
    container_name: learn-openusd

    # -------------------------------------------------------
    # ホストのリポジトリをコンテナにマウント
    # → ホスト側でファイル編集 → コンテナ内に即反映
    # -------------------------------------------------------
    volumes:
      - .:/workspace
      # uv のキャッシュを永続化（依存関係の再取得を防ぐ）
      - uv-cache:/root/.cache/uv

    # -------------------------------------------------------
    # ポートマッピング
    # -------------------------------------------------------
    ports:
      - "8888:8888"   # JupyterLab
      - "8000:8000"   # Sphinx ドキュメントプレビュー

    # -------------------------------------------------------
    # 環境変数
    # -------------------------------------------------------
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      # JupyterLab のルートディレクトリ
      - JUPYTER_ROOT_DIR=/workspace

    # -------------------------------------------------------
    # 起動コマンド: JupyterLab
    # -------------------------------------------------------
    command: >
      uv run jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
      --notebook-dir=/workspace

    # -------------------------------------------------------
    # DGX Spark の GPU を使う場合（オプション）
    # usd-core 自体は CPU 動作だが、将来的な Omniverse 拡張用に
    # コメントアウトで残しておく
    # -------------------------------------------------------
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # -------------------------------------------------------
    # コンテナが落ちても自動再起動（開発中は on-failure が便利）
    # -------------------------------------------------------
    restart: unless-stopped

# -------------------------------------------------------
# 名前付きボリューム
# -------------------------------------------------------
volumes:
  uv-cache:
